<!doctype html>
<html lang="zh-TW">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
		<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

		<style>
		.material-symbols-outlined { visibility: hidden; }
		.fonts-loaded .material-symbols-outlined { visibility: visible; }
	</style>
	<script>
			(function () {
				const theme = localStorage.getItem('theme');
				if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
					document.documentElement.classList.add('dark');
					document.documentElement.style.backgroundColor = '#101622';
				} else {
					document.documentElement.style.backgroundColor = '#f5f6f8';
				}
				document.fonts.ready.then(function () {
					document.documentElement.classList.add('fonts-loaded');
				});
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
