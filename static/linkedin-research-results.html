<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --card: #334155;
    --card-hover: #3b4d6b;
    --accent: #38bdf8;
    --accent2: #818cf8;
    --text: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --green: #34d399;
    --orange: #fb923c;
    --border: #475569;
    --linkedin: #0a66c2;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  header {
    text-align: center;
    margin-bottom: 3rem;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 0.5rem;
  }

  header .date {
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
    margin-bottom: 3rem;
  }

  .stat-card {
    background: var(--surface);
    border-radius: 12px;
    padding: 1.5rem;
    border: 1px solid var(--border);
  }

  .stat-card h3 {
    font-size: 1rem;
    color: var(--text-secondary);
    margin-bottom: 1rem;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
  }

  .stat-label { color: var(--text-secondary); font-size: 0.9rem; }
  .stat-value { font-size: 1.5rem; font-weight: 700; }
  .stat-value.stay { color: var(--green); }
  .stat-value.return { color: var(--orange); }

  .stat-bar {
    height: 8px;
    background: var(--card);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 0.5rem;
  }

  .stat-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease;
  }

  .stat-bar-fill.stay { background: var(--green); }
  .stat-bar-fill.return { background: var(--orange); }

  /* School Sections */
  .school-section {
    margin-bottom: 3rem;
  }

  .school-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.5rem;
  }

  .school-header h2 {
    font-size: 1.5rem;
    font-weight: 700;
  }

  .school-badge {
    font-size: 0.75rem;
    padding: 0.25rem 0.75rem;
    border-radius: 999px;
    font-weight: 600;
  }

  .badge-ucsd { background: rgba(56, 189, 248, 0.15); color: var(--accent); }
  .badge-uva { background: rgba(129, 140, 248, 0.15); color: var(--accent2); }

  .subsection {
    margin-bottom: 2rem;
  }

  .subsection-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .subsection-header h3 {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text-secondary);
  }

  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-stay { background: var(--green); }
  .dot-return { background: var(--orange); }

  /* Cards */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1rem;
  }

  .person-card {
    background: var(--card);
    border-radius: 12px;
    padding: 1.25rem;
    border: 1px solid transparent;
    transition: border-color 0.2s, transform 0.2s;
  }

  .person-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 0.75rem;
  }

  .card-name {
    font-size: 1.1rem;
    font-weight: 700;
  }

  .linkedin-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    background: var(--linkedin);
    color: #fff;
    text-decoration: none;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.3rem 0.65rem;
    border-radius: 6px;
    transition: opacity 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .linkedin-btn:hover { opacity: 0.85; }

  .linkedin-btn svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
  }

  .card-detail {
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-bottom: 0.35rem;
    display: flex;
    gap: 0.4rem;
  }

  .card-detail .label {
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .card-note {
    font-size: 0.8rem;
    color: var(--text-muted);
    background: rgba(255,255,255,0.05);
    padding: 0.4rem 0.6rem;
    border-radius: 6px;
    margin-top: 0.5rem;
  }

  /* Placeholder */
  .placeholder {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 2rem;
    text-align: center;
    color: var(--text-muted);
    font-size: 0.95rem;
  }

  .placeholder .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 0.5rem;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Broad match cards */
  .person-card.broad-match {
    opacity: 0.7;
    border: 1px dashed var(--border);
  }
  .person-card.broad-match:hover {
    opacity: 0.9;
    border-color: var(--accent2);
  }

  .card-tag {
    font-size: 0.65rem;
    padding: 0.15rem 0.5rem;
    border-radius: 999px;
    font-weight: 600;
    margin-left: 0.5rem;
    vertical-align: middle;
    white-space: nowrap;
  }
  .tag-broad { background: rgba(129,140,248,0.2); color: var(--accent2); }
  .tag-enrolled { background: rgba(251,146,60,0.2); color: var(--orange); }

  .field-tag {
    font-size: 0.65rem;
    padding: 0.2rem 0.55rem;
    border-radius: 999px;
    font-weight: 600;
    white-space: nowrap;
    display: inline-block;
    margin-bottom: 0.6rem;
  }
  .field-ds { background: rgba(56,189,248,0.18); color: #38bdf8; }
  .field-ml { background: rgba(168,85,247,0.18); color: #a855f7; }
  .field-ai { background: rgba(52,211,153,0.18); color: #34d399; }
  .field-swe { background: rgba(99,102,241,0.18); color: #818cf8; }
  .field-da { background: rgba(251,191,36,0.18); color: #fbbf24; }
  .field-de { background: rgba(244,114,182,0.18); color: #f472b6; }

  /* Enrolled cards */
  .person-card.enrolled {
    border: 2px dashed var(--border);
    background: rgba(51,65,85,0.5);
  }
  .person-card.enrolled:hover {
    border-color: var(--orange);
  }

  /* No results */
  .no-results {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem 2rem;
    text-align: center;
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  /* Analysis section */
  .analysis-section {
    margin-top: 1rem;
    margin-bottom: 3rem;
  }

  .analysis-card {
    background: var(--surface);
    border-radius: 12px;
    padding: 1.5rem;
    border: 1px solid var(--border);
  }

  .analysis-card h3 {
    font-size: 1.1rem;
    margin-bottom: 1rem;
    color: var(--text);
  }

  .analysis-card ul {
    list-style: none;
    padding: 0;
  }

  .analysis-card li {
    font-size: 0.9rem;
    color: var(--text-secondary);
    padding: 0.5rem 0;
    border-bottom: 1px solid rgba(71,85,105,0.4);
    line-height: 1.5;
  }

  .analysis-card li:last-child { border-bottom: none; }

  .analysis-card li::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 0.6rem;
    vertical-align: middle;
  }

  /* Nationality tag */
  .nationality-tag {
    font-size: 0.65rem;
    padding: 0.15rem 0.5rem;
    border-radius: 999px;
    font-weight: 600;
    display: inline-block;
    margin-right: 0.35rem;
    vertical-align: middle;

  .nat-india { background: rgba(255,153,51,0.18); color: #ff9933; }
  .nat-china { background: rgba(222,41,16,0.18); color: #ee4433; }
  .nat-korea { background: rgba(0,71,160,0.18); color: #4d94ff; }
  .nat-indonesia { background: rgba(206,17,38,0.18); color: #34d399; }

  .section-divider {
    border: none;
    border-top: 2px solid var(--border);
    margin: 2rem 0 2.5rem;
  }

  .intl-section-title {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.5rem;
  }

  .intl-section-subtitle {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-bottom: 2rem;
  }

  @media (max-width: 640px) {
    .container { padding: 1rem; }
    header h1 { font-size: 1.4rem; }
    .cards-grid { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr; }
  }

function renderCard(person, extraClass) {
  const cls = extraClass ? ` ${extraClass}` : '';
  const noteHtml = person.note ? `<div class="card-note">${person.note}</div>` : '';
  const prevHtml = person.prev ? `<div class="card-detail"><span class="label">前職：</span><span>${person.prev}</span></div>` : '';
  const tagHtml = person.tag ? `<span class="card-tag tag-broad">${person.tag}</span>` : '';
  const fieldHtml = person.field ? `<span class="field-tag ${fieldColorMap[person.field] || 'field-ds'}">${person.field}</span>` : '';
  return `
    <div class="person-card${cls}">
      ${fieldHtml}
      <div class="card-top">
        <div class="card-name">${person.name}${tagHtml}</div>
        <a class="linkedin-btn" href="https://linkedin.com/in/${person.linkedin}/" target="_blank" rel="noopener">${linkedinSVG} LinkedIn</a>
      </div>
      <div class="card-detail"><span class="label">學位：</span><span>${person.degree}</span></div>
      ${person.undergrad ? `<div class="card-detail"><span class="label">大學：</span><span>${person.undergrad}</span></div>` : ''}
      ${person.current ? `<div class="card-detail"><span class="label">現職：</span><span>${person.current}</span></div>` : ''}
      ${person.location ? `<div class="card-detail"><span class="label">地點：</span><span>${person.location}</span></div>` : ''}
      ${prevHtml}
      ${noteHtml}
    </div>`;
}

function renderPlaceholder() {
  return `<div class="placeholder"><span class="spinner"></span>搜尋中...</div>`;
}

function renderSection(school) {
  const stayCards = school.stay.length > 0
    ? `<div class="cards-grid">${school.stay.map(p => renderCard(p)).join('')}</div>`
    : renderPlaceholder();

  const returnCards = school.return.length > 0
    ? `<div class="cards-grid">${school.return.map(p => renderCard(p)).join('')}</div>`
    : (school._returnSearched ? `<div class="no-results">未找到符合案例</div>` : renderPlaceholder());

  // Broad match subsection (UvA only)
  const broadMatch = school.broadMatch || [];
  const broadHtml = broadMatch.length > 0 ? `
      <div class="subsection">
        <div class="subsection-header">
          <span class="dot" style="background:var(--accent2)"></span>
          <h3>廣義符合（非標準碩士）</h3>
          <span style="color:var(--text-muted);font-size:0.85rem;margin-left:auto">${broadMatch.length} 人</span>
        </div>
        <div class="cards-grid">${broadMatch.map(p => renderCard(p, 'broad-match')).join('')}</div>
      </div>` : '';

  // Enrolled subsection (UvA only)
  const enrolled = school.enrolled || [];
  const enrolledHtml = enrolled.length > 0 ? `
      <div class="subsection">
        <div class="subsection-header">
          <span class="dot" style="background:var(--text-muted);border:2px dashed var(--orange);background:transparent"></span>
          <h3>目前就讀中</h3>
          <span style="color:var(--text-muted);font-size:0.85rem;margin-left:auto">${enrolled.length} 人</span>
        </div>
        <div class="cards-grid">${enrolled.map(p => renderCard(p, 'enrolled')).join('')}</div>
      </div>` : '';

  return `
    <section class="school-section">
      <div class="school-header">
        <h2>${school.name}</h2>
        <span class="school-badge ${school.badgeClass}">${school.field}</span>

      <div class="subsection">
        <div class="subsection-header">
          <span class="dot dot-stay"></span>
          <h3>${school.stayLabel}</h3>
          <span style="color:var(--text-muted);font-size:0.85rem;margin-left:auto">${school.stay.length} 人</span>
        </div>
        ${stayCards}
      </div>

      ${broadHtml}
      ${enrolledHtml}

      <div class="subsection">
        <div class="subsection-header">
          <span class="dot dot-return"></span>
          <h3>${school.returnLabel}</h3>
          <span style="color:var(--text-muted);font-size:0.85rem;margin-left:auto">${school.return.length > 0 ? school.return.length + ' 人' : '0 人'}</span>
        </div>

    </section>`;
}

function renderStats() {

    const total = stayN + retN;
    const stayPct = total > 0 ? Math.round(stayN / total * 100) : 0;
    const retPct = total > 0 ? Math.round(retN / total * 100) : 0;

        <span class="stat-value return">${retN} <small style="font-size:0.8rem;font-weight:400;color:var(--text-muted)">(${retPct}%)</small></span>
      </div>
      <div class="stat-bar"><div class="stat-bar-fill return" style="width:${retPct}%"></div></div>` : ''}
      <p style="color:var(--text-muted);font-size:0.8rem;margin-top:0.75rem">共 ${total} 人</p>
    </div>`;
  });
  html += `</div>`;

  // Cards per school
  intlData.schools.forEach(school => {
    html += `<section class="school-section">
      <div class="school-header">
        <h2>${school.name}</h2>
        <span class="school-badge ${school.badgeClass}">亞洲外國人</span>
      </div>
      <p style="color:var(--text-muted);margin-bottom:1.5rem;font-size:0.9rem">${school.fullName}</p>`;

    if (school.groups.length === 0) {
      html += renderPlaceholder();
    } else {
      school.groups.forEach(g => {
        const dotStyle = g.returnGroup ? 'background:var(--orange)' : 'background:var(--green)';
        html += `<div class="subsection">
          <div class="subsection-header">
            <span class="nationality-tag ${g.natClass}">${g.flag}</span>
            <span class="dot" style="${dotStyle}"></span>
            <h3>${g.nationality} — ${g.stayLabel}</h3>
            <span style="color:var(--text-muted);font-size:0.85rem;margin-left:auto">${g.people.length} 人</span>
          </div>
          <div class="cards-grid">${g.people.map(p => renderIntlCard(p, g.natClass, g.flag)).join('')}</div>
        </div>`;
      });
    }
    html += `</section>`;
  });

  return html;
}

document.getElementById('stats').innerHTML = renderStats();
document.getElementById('app').innerHTML = data.schools.map(renderSection).join('') + renderAnalysis();
document.getElementById('intl').innerHTML = renderIntlSection();
</script>
</body>
</html>
